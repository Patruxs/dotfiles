---
- name: Local Machine Setup
  hosts: localhost
  connection: local
  gather_facts: yes

  vars:
    chezmoi_dir: "{{ lookup('env', 'HOME') }}/.local/share/chezmoi"
    dotfiles_ci: "{{ (((lookup('env', 'DOTFILES_CI') | default('', true)) or (lookup('env', 'CI') | default('', true))) | string | lower) in ['1', 'true', 'yes'] }}"
    dotfiles_sudo_password_file: "{{ lookup('env', 'DOTFILES_SUDO_PASSWORD_FILE') | default('', true) }}"

  pre_tasks:
    - name: Check for passwordless sudo on Linux
      command: sudo -n true
      register: dotfiles_passwordless_sudo
      changed_when: false
      failed_when: false
      when: ansible_facts["system"] == "Linux"

    - name: Check saved profile and ask for confirmation
      pause:
        prompt: "Current profile is {{ ansible_facts['dotfiles_profile'] }}. Continue? [Y/n]"
      register: confirm_profile
      when:
        - profile is not defined
        - ansible_facts["dotfiles_profile"] is defined
        - ansible_facts["env"]["TERM"] is defined

    - name: Set profile from saved fact if confirmed
      set_fact:
        profile: "{{ ansible_facts['dotfiles_profile'] }}"
      when:
        - profile is not defined
        - confirm_profile is defined
        - not confirm_profile.skipped | default(false)
        - confirm_profile.user_input | default('y') | lower in ['y', 'yes', '']

    - name: Reuse saved profile in non-interactive mode
      set_fact:
        profile: "{{ ansible_facts['dotfiles_profile'] }}"
      when:
        - profile is not defined
        - ansible_facts["dotfiles_profile"] is defined
        - ansible_facts["env"]["TERM"] is not defined

    - name: Prompt for profile if not provided or saved/confirmed
      pause:
        prompt: "Select profile (personal or work)"
      register: prompt_profile
      when:
        - profile is not defined
        - ansible_facts["env"]["TERM"] is defined

    - name: Set profile fact from prompt
      set_fact:
        profile: "{{ prompt_profile.user_input }}"
      when: profile is not defined and prompt_profile is defined and not prompt_profile.skipped | default(false)

    - name: Fail clearly when no profile is available in non-interactive mode
      fail:
        msg: "No profile was provided. Re-run bootstrap.sh and choose a profile, or pass -e profile=personal|work."
      when:
        - profile is not defined
        - ansible_facts["env"]["TERM"] is not defined

    - name: Fail if invalid profile
      fail:
        msg: "Invalid profile selected. Must be 'personal' or 'work'"
      when: profile not in ['personal', 'work']

    - name: Save selected profile to facts cache
      set_fact:
        dotfiles_profile: "{{ profile }}"
        cacheable: yes

    - name: Remove old legacy profile file if it exists
      file:
        path: "{{ lookup('env', 'HOME') }}/.dotfiles_profile"
        state: absent

    - name: Load profile vars
      include_vars:
        file: "{{ chezmoi_dir }}/ansible/vars/profiles/{{ profile }}.yml"

    - name: Load chezmoi packages data
      include_vars:
        file: "{{ chezmoi_dir }}/.chezmoidata/packages.yaml"
        name: chezmoi_data

    - name: Fail clearly when Linux privileged automation password is unavailable
      fail:
        msg: "DOTFILES_SUDO_PASSWORD_FILE was not provided and passwordless sudo is unavailable. Re-run bootstrap.sh from an interactive terminal."
      when:
        - ansible_facts["system"] == "Linux"
        - not (dotfiles_ci | default(false))
        - dotfiles_sudo_password_file == ""
        - dotfiles_passwordless_sudo.rc != 0

  roles:
    - platform
    - base
    - packages
    - git_tools
    - flatpak
    - gnome
    - ai_tools
    - docker
    - shell
    - chezmoi
