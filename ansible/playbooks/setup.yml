---
- name: Compatibility setup entrypoint
  hosts: localhost
  connection: local
  gather_facts: yes

  vars:
    chezmoi_dir: "{{ lookup('env', 'DOTFILES_CHEZMOI_DIR') | default(lookup('env', 'HOME') ~ '/.local/share/chezmoi', true) }}"
    dotfiles_ci: "{{ (lookup('env', 'DOTFILES_CI') | default('', true) | string | lower) in ['1', 'true', 'yes'] }}"
    dotfiles_sudo_password_file: "{{ lookup('env', 'DOTFILES_SUDO_PASSWORD_FILE') | default('', true) }}"

  pre_tasks:
    - name: Derive compatibility platform facts
      include_role:
        name: platform

    - name: Normalize compatibility platform name
      set_fact:
        dotfiles_platform: >-
          {{
            dotfiles_platform
            | combine({
              'name': 'ubuntu' if ansible_facts['distribution'] == 'Ubuntu' else 'fedora' if ansible_facts['distribution'] == 'Fedora' else 'arch' if ansible_facts['os_family'] == 'Archlinux' else 'macos' if ansible_facts['system'] == 'Darwin' else '',
              'package_family': 'apt' if ansible_facts['distribution'] == 'Ubuntu' else 'dnf' if ansible_facts['distribution'] == 'Fedora' else 'pacman' if ansible_facts['os_family'] == 'Archlinux' else 'brew' if ansible_facts['system'] == 'Darwin' else ''
            })
          }}

    - name: Fail when compatibility setup cannot map the current platform
      fail:
        msg: "Unsupported platform for setup.yml compatibility entrypoint."
      when: dotfiles_platform.name == ''

    - name: Load selected platform package set
      include_vars:
        file: "{{ chezmoi_dir }}/ansible/vars/package_sets/{{ dotfiles_platform.name }}.yml"
        name: platform_package_data

  tasks:
    - import_tasks: common.yml
