- name: Prepare low-memory Linux setup (strict)
  block:
    - include_role:
        name: low_memory

    - name: Record low-memory setup completion
      set_fact:
        dotfiles_setup_configured: >-
          {{
            dotfiles_setup_configured + [
              {
                'phase': 'low_memory',
                'name': 'swap and installer throttling',
                'detail': dotfiles_low_memory_summary | default('Low-memory setup was enabled for this machine.')
              }
            ]
          }}
  when:
    - dotfiles_setup_mode == 'strict'
    - dotfiles_low_memory_setup | default(false) | bool
    - dotfiles_platform.system == 'Linux'

- name: Prepare low-memory Linux setup (best effort)
  block:
    - include_role:
        name: low_memory

    - name: Record low-memory setup completion
      set_fact:
        dotfiles_setup_configured: >-
          {{
            dotfiles_setup_configured + [
              {
                'phase': 'low_memory',
                'name': 'swap and installer throttling',
                'detail': dotfiles_low_memory_summary | default('Low-memory setup was enabled for this machine.')
              }
            ]
          }}
  rescue:
    - name: Record low-memory setup failure
      set_fact:
        dotfiles_setup_failures: >-
          {{
            dotfiles_setup_failures + [
              {
                'phase': 'low_memory',
                'name': 'swap and installer throttling',
                'task': ansible_failed_task.name | default('unknown task'),
                'error': (ansible_failed_result.stderr | default('') | string) if (ansible_failed_result.stderr | default('') | string | length > 0) else (ansible_failed_result.msg | default(ansible_failed_result | to_json))
              }
            ]
          }}
  when:
    - dotfiles_setup_mode == 'best_effort'
    - dotfiles_low_memory_setup | default(false) | bool
    - dotfiles_platform.system == 'Linux'

- name: Generate Chezmoi setup data
  include_role:
    name: chezmoi_setup_data

- name: Record Chezmoi setup data generation
  set_fact:
    dotfiles_setup_configured: >-
      {{
        dotfiles_setup_configured + [
          {
            'phase': 'chezmoi',
            'name': 'setup data',
            'detail': 'Selected profile, platform, and features were generated for guarded templates.'
          }
        ]
      }}

- name: Install selected package-set entries (strict)
  block:
    - include_role:
        name: package_installer

    - name: Record package installer completion
      set_fact:
        dotfiles_setup_configured: >-
          {{
            dotfiles_setup_configured + [
              {
                'phase': 'packages',
                'name': 'direct package entries',
                'detail': 'Selected package-set entries finished through ' ~ dotfiles_platform.package_family ~ '.'
              }
            ]
          }}
  when: dotfiles_setup_mode == 'strict'

- name: Install selected package-set entries (best effort)
  block:
    - include_role:
        name: package_installer

    - name: Record package installer completion
      set_fact:
        dotfiles_setup_configured: >-
          {{
            dotfiles_setup_configured + [
              {
                'phase': 'packages',
                'name': 'direct package entries',
                'detail': 'Selected package-set entries finished through ' ~ dotfiles_platform.package_family ~ '.'
              }
            ]
          }}
  rescue:
    - name: Record package installation failure
      set_fact:
        dotfiles_setup_failures: >-
          {{
            dotfiles_setup_failures + [
              {
                'phase': 'packages',
                'name': 'Install selected package-set entries',
                'task': ansible_failed_task.name | default('unknown task'),
                'error': (ansible_failed_result.stderr | default('') | string) if (ansible_failed_result.stderr | default('') | string | length > 0) else (ansible_failed_result.msg | default(ansible_failed_result | to_json))
              }
            ]
          }}
  when: dotfiles_setup_mode == 'best_effort'

- name: Run selected feature roles
  include_tasks: feature_best_effort.yml
  loop: "{{ dotfiles_feature_execution_order }}"
  loop_control:
    loop_var: selected_feature
  when: selected_feature in (features | default([]))

