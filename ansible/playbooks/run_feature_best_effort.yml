---
- name: Run selected feature role {{ selected_feature }} (strict)
  block:
    - include_role:
        name: "features/{{ selected_feature }}"

    - name: Record selected feature completion
      set_fact:
        dotfiles_setup_configured: >-
          {{
            dotfiles_setup_configured + [
              {
                'phase': 'feature',
                'name': selected_feature,
                'detail': 'Selected feature role finished; platform and environment conditions may skip individual subtasks.'
              }
            ]
          }}
  when: dotfiles_setup_mode == 'strict'

- name: Run selected feature role {{ selected_feature }} (best effort)
  block:
    - include_role:
        name: "features/{{ selected_feature }}"

    - name: Record selected feature completion
      set_fact:
        dotfiles_setup_configured: >-
          {{
            dotfiles_setup_configured + [
              {
                'phase': 'feature',
                'name': selected_feature,
                'detail': 'Selected feature role finished; platform and environment conditions may skip individual subtasks.'
              }
            ]
          }}
  rescue:
    - name: Record selected feature failure
      set_fact:
        dotfiles_setup_failures: >-
          {{
            dotfiles_setup_failures + [
              {
                'phase': 'feature',
                'name': selected_feature,
                'task': ansible_failed_task.name | default('unknown task'),
                'error': (ansible_failed_result.stderr | default('') | string) if (ansible_failed_result.stderr | default('') | string | length > 0) else (ansible_failed_result.msg | default(ansible_failed_result | to_json))
              }
            ]
          }}
  when: dotfiles_setup_mode == 'best_effort'
