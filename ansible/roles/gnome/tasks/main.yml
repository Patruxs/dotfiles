---
- name: Check if GNOME is running
  command: "pgrep -f gnome-session"
  register: gnome_running
  ignore_errors: yes
  when: gnome_settings_enabled | default(false) and ansible_system == 'Linux'

- name: Apply GNOME settings stub
  debug:
    msg: "GNOME settings would be applied here via dconf load or a chezmoi script."
  when: gnome_settings_enabled | default(false) and ansible_system == 'Linux' and gnome_running.rc == 0
