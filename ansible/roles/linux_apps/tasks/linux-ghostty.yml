---
- name: Install or update Ghostty on Debian-based Linux
  ansible.builtin.shell: |
    set -euo pipefail

    if [ -n {{ dotfiles_sudo_password_file | quote }} ]; then
      sudo -S -p '' /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/mkasberg/ghostty-ubuntu/HEAD/install.sh)" < {{ dotfiles_sudo_password_file | quote }}
    else
      sudo -n /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/mkasberg/ghostty-ubuntu/HEAD/install.sh)"
    fi
  args:
    executable: /bin/bash
  changed_when: false
  when:
    - dotfiles_platform.distro_key == 'debian'

- name: Install or update Ghostty on Fedora
  ansible.builtin.shell: |
    set -euo pipefail

    if [ -n {{ dotfiles_sudo_password_file | quote }} ]; then
      sudo -S -p '' dnf -y copr enable scottames/ghostty < {{ dotfiles_sudo_password_file | quote }}
      sudo -S -p '' dnf install -y ghostty < {{ dotfiles_sudo_password_file | quote }}
    else
      sudo -n dnf -y copr enable scottames/ghostty
      sudo -n dnf install -y ghostty
    fi
  args:
    executable: /bin/bash
  changed_when: false
  when:
    - dotfiles_platform.distro_key == 'fedora'

- name: Install or update Ghostty on Arch Linux
  ansible.builtin.shell: |
    set -euo pipefail

    if [ -n {{ dotfiles_sudo_password_file | quote }} ]; then
      sudo -S -p '' pacman -S --noconfirm --needed ghostty < {{ dotfiles_sudo_password_file | quote }}
    else
      sudo -n pacman -S --noconfirm --needed ghostty
    fi
  args:
    executable: /bin/bash
  changed_when: false
  when:
    - dotfiles_platform.distro_key == 'arch'
