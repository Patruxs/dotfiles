---
- name: Install or update Ghostty on Debian-based Linux
  become: yes
  shell: |
    set -euo pipefail
    /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/mkasberg/ghostty-ubuntu/HEAD/install.sh)"
  args:
    executable: /bin/bash
  when:
    - dotfiles_platform.distro_key == 'debian'

- name: Install or update Ghostty on Fedora
  become: yes
  shell: |
    set -euo pipefail
    dnf -y copr enable scottames/ghostty
    dnf install -y ghostty
  args:
    executable: /bin/bash
  when:
    - dotfiles_platform.distro_key == 'fedora'

- name: Install or update Ghostty on Arch Linux
  become: yes
  command:
    argv:
      - pacman
      - -S
      - --noconfirm
      - --needed
      - ghostty
  when:
    - dotfiles_platform.distro_key == 'arch'
