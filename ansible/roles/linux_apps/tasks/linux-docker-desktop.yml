---
- name: Install or update Docker Desktop on Ubuntu
  vars:
    docker_ubuntu_release: >-
      {{
        ansible_facts['distribution_release']
        | default(lookup('pipe', '. /etc/os-release && printf %s "$VERSION_CODENAME"'))
      }}
  when:
    - dotfiles_platform.distro_key == 'debian'
    - dotfiles_platform.distribution == 'Ubuntu'
    - dotfiles_platform.distribution_version in ['24.04', '26.04']
    - dotfiles_platform.architecture in ['x86_64', 'amd64']
  block:
    - name: Create temporary directory for Docker Desktop Debian package
      tempfile:
        state: directory
        prefix: docker-desktop-
      register: docker_desktop_tmpdir_debian
      changed_when: false

    - name: Download Docker Desktop Debian package
      get_url:
        url: https://desktop.docker.com/linux/main/amd64/docker-desktop-amd64.deb
        dest: "{{ docker_desktop_tmpdir_debian.path }}/docker-desktop-amd64.deb"
        mode: "0644"
      changed_when: false

    - name: Ensure APT keyrings directory exists
      become: yes
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker APT repository signing key
      become: yes
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker APT repository
      become: yes
      apt_repository:
        repo: "deb [arch={{ 'amd64' if dotfiles_platform.architecture in ['x86_64', 'amd64'] else 'arm64' }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ docker_ubuntu_release }} stable"
        filename: docker
        state: present
        update_cache: yes

    - name: Install Docker Desktop Ubuntu prerequisites
      become: yes
      ansible.builtin.apt:
        name:
          - docker-ce-cli
          - pass
          - desktop-file-utils
          - qemu-system-x86
          - uidmap
        state: present

    - name: Install Docker Desktop Debian package
      become: yes
      ansible.builtin.apt:
        deb: "{{ docker_desktop_tmpdir_debian.path }}/docker-desktop-amd64.deb"
        state: present
  always:
    - name: Remove temporary Docker Desktop Debian package directory
      file:
        path: "{{ docker_desktop_tmpdir_debian.path }}"
        state: absent
      changed_when: false
      when: docker_desktop_tmpdir_debian is defined and docker_desktop_tmpdir_debian.path is defined

- name: Install or update Docker Desktop on Fedora
  when:
    - dotfiles_platform.distro_key == 'fedora'
    - (dotfiles_platform.distribution_major_version | int) >= 43
    - dotfiles_platform.architecture in ['x86_64', 'amd64']
  block:
    - name: Create temporary directory for Docker Desktop Fedora package
      tempfile:
        state: directory
        prefix: docker-desktop-
      register: docker_desktop_tmpdir_fedora
      changed_when: false

    - name: Download Docker Desktop Fedora package
      get_url:
        url: https://desktop.docker.com/linux/main/amd64/docker-desktop-x86_64.rpm
        dest: "{{ docker_desktop_tmpdir_fedora.path }}/docker-desktop-x86_64.rpm"
        mode: "0644"
      changed_when: false

    - name: Add Docker DNF repository
      become: yes
      get_url:
        url: https://download.docker.com/linux/fedora/docker-ce.repo
        dest: /etc/yum.repos.d/docker-ce.repo
        mode: "0644"

    - name: Install Docker Desktop Fedora prerequisites
      become: yes
      ansible.builtin.dnf:
        name:
          - docker-ce-cli
          - pass
          - desktop-file-utils
          - gtk3-devel
          - qemu-system-x86
          - shadow-utils
        state: present

    - name: Install Docker Desktop Fedora package
      become: yes
      ansible.builtin.dnf:
        name: "{{ docker_desktop_tmpdir_fedora.path }}/docker-desktop-x86_64.rpm"
        state: present
        disable_gpg_check: yes
  always:
    - name: Remove temporary Docker Desktop Fedora package directory
      file:
        path: "{{ docker_desktop_tmpdir_fedora.path }}"
        state: absent
      changed_when: false
      when: docker_desktop_tmpdir_fedora is defined and docker_desktop_tmpdir_fedora.path is defined

- name: Install or update Docker Desktop on Arch Linux
  when:
    - dotfiles_platform.distro_key == 'arch'
    - dotfiles_platform.architecture in ['x86_64', 'amd64']
  block:
    - name: Create temporary directory for Docker Desktop Arch package
      tempfile:
        state: directory
        prefix: docker-desktop-
      register: docker_desktop_tmpdir_arch
      changed_when: false

    - name: Download Docker Desktop Arch package
      get_url:
        url: https://desktop.docker.com/linux/main/amd64/docker-desktop-x86_64.pkg.tar.zst
        dest: "{{ docker_desktop_tmpdir_arch.path }}/docker-desktop-x86_64.pkg.tar.zst"
        mode: "0644"
      changed_when: false

    - name: Install Docker Desktop Arch prerequisites
      become: yes
      community.general.pacman:
        name:
          - curl
          - qemu-desktop
          - libseccomp
          - libcap-ng
          - pass
          - desktop-file-utils
          - gtk3
          - libx11
          - shadow
        state: present

    - name: Install Docker Desktop Arch package
      become: yes
      community.general.pacman:
        name: "{{ docker_desktop_tmpdir_arch.path }}/docker-desktop-x86_64.pkg.tar.zst"
        state: present
  always:
    - name: Remove temporary Docker Desktop Arch package directory
      file:
        path: "{{ docker_desktop_tmpdir_arch.path }}"
        state: absent
      changed_when: false
      when: docker_desktop_tmpdir_arch is defined and docker_desktop_tmpdir_arch.path is defined
