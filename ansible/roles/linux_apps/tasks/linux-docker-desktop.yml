---
- name: Install or update Docker Desktop on Debian-based Distros
  vars:
    docker_ubuntu_release: "{{ dotfiles_platform.ubuntu_codename }}"
  when:
    - dotfiles_platform.distro_key == 'debian'
    - dotfiles_platform.ubuntu_codename in ['focal', 'jammy', 'noble', 'oracular', 'plucky']
    - dotfiles_platform.architecture in ['x86_64', 'amd64']
  block:
    - name: Create temporary directory for Docker Desktop Debian package
      tempfile:
        state: directory
        prefix: docker-desktop-
      register: docker_desktop_tmpdir_debian
      changed_when: false

    - name: Download Docker Desktop Debian package
      get_url:
        url: https://desktop.docker.com/linux/main/amd64/docker-desktop-amd64.deb
        dest: "{{ docker_desktop_tmpdir_debian.path }}/docker-desktop-amd64.deb"
        mode: "0644"
      changed_when: false

    - name: Install Docker Desktop Debian package
      ansible.builtin.shell: |
        set -euo pipefail
        root_script="$(mktemp)"
        trap 'rm -f "$root_script"' EXIT
        cat >"$root_script" <<'DOTFILES_ROOT_SCRIPT'
        set -euo pipefail
        install -d -m 0755 /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        chmod 0644 /etc/apt/keyrings/docker.asc
        cat >/etc/apt/sources.list.d/docker.sources <<'DOCKER_SOURCES'
        Types: deb
        URIs: https://download.docker.com/linux/ubuntu
        Suites: {{ docker_ubuntu_release }}
        Components: stable
        Architectures: {{ 'amd64' if dotfiles_platform.architecture in ['x86_64', 'amd64'] else 'arm64' }}
        Signed-By: /etc/apt/keyrings/docker.asc
        DOCKER_SOURCES
        apt-get update
        apt-get install -y docker-ce-cli pass desktop-file-utils qemu-system-x86 uidmap
        apt-get install -y {{ docker_desktop_tmpdir_debian.path | quote }}/docker-desktop-amd64.deb
        DOTFILES_ROOT_SCRIPT

        if [ -n {{ dotfiles_sudo_password_file | quote }} ]; then
          sudo -S -p '' /bin/bash "$root_script" < {{ dotfiles_sudo_password_file | quote }}
        else
          sudo -n /bin/bash "$root_script"
        fi
      args:
        executable: /bin/bash
  always:
    - name: Remove temporary Docker Desktop Debian package directory
      file:
        path: "{{ docker_desktop_tmpdir_debian.path }}"
        state: absent
      changed_when: false
      when: docker_desktop_tmpdir_debian is defined and docker_desktop_tmpdir_debian.path is defined

- name: Install or update Docker Desktop on Fedora
  when:
    - dotfiles_platform.distro_key == 'fedora'
    - (dotfiles_platform.distribution_major_version | int) >= 43
    - dotfiles_platform.architecture in ['x86_64', 'amd64']
  block:
    - name: Create temporary directory for Docker Desktop Fedora package
      tempfile:
        state: directory
        prefix: docker-desktop-
      register: docker_desktop_tmpdir_fedora
      changed_when: false

    - name: Download Docker Desktop Fedora package
      get_url:
        url: https://desktop.docker.com/linux/main/amd64/docker-desktop-x86_64.rpm
        dest: "{{ docker_desktop_tmpdir_fedora.path }}/docker-desktop-x86_64.rpm"
        mode: "0644"
      changed_when: false

    - name: Install Docker Desktop Fedora package
      ansible.builtin.shell: |
        set -euo pipefail
        root_script="$(mktemp)"
        trap 'rm -f "$root_script"' EXIT
        cat >"$root_script" <<'DOTFILES_ROOT_SCRIPT'
        set -euo pipefail
        curl -fsSL https://download.docker.com/linux/fedora/docker-ce.repo -o /etc/yum.repos.d/docker-ce.repo
        chmod 0644 /etc/yum.repos.d/docker-ce.repo
        dnf install -y docker-ce-cli pass desktop-file-utils gtk3-devel qemu-system-x86 shadow-utils
        dnf install -y --nogpgcheck {{ docker_desktop_tmpdir_fedora.path | quote }}/docker-desktop-x86_64.rpm
        DOTFILES_ROOT_SCRIPT

        if [ -n {{ dotfiles_sudo_password_file | quote }} ]; then
          sudo -S -p '' /bin/bash "$root_script" < {{ dotfiles_sudo_password_file | quote }}
        else
          sudo -n /bin/bash "$root_script"
        fi
      args:
        executable: /bin/bash
  always:
    - name: Remove temporary Docker Desktop Fedora package directory
      file:
        path: "{{ docker_desktop_tmpdir_fedora.path }}"
        state: absent
      changed_when: false
      when: docker_desktop_tmpdir_fedora is defined and docker_desktop_tmpdir_fedora.path is defined

- name: Install or update Docker Desktop on Arch Linux
  when:
    - dotfiles_platform.distro_key == 'arch'
    - dotfiles_platform.architecture in ['x86_64', 'amd64']
  block:
    - name: Create temporary directory for Docker Desktop Arch package
      tempfile:
        state: directory
        prefix: docker-desktop-
      register: docker_desktop_tmpdir_arch
      changed_when: false

    - name: Download Docker Desktop Arch package
      get_url:
        url: https://desktop.docker.com/linux/main/amd64/docker-desktop-x86_64.pkg.tar.zst
        dest: "{{ docker_desktop_tmpdir_arch.path }}/docker-desktop-x86_64.pkg.tar.zst"
        mode: "0644"
      changed_when: false

    - name: Install Docker Desktop Arch package
      ansible.builtin.shell: |
        set -euo pipefail
        root_script="$(mktemp)"
        trap 'rm -f "$root_script"' EXIT
        cat >"$root_script" <<'DOTFILES_ROOT_SCRIPT'
        set -euo pipefail
        pacman -S --noconfirm --needed curl qemu-desktop libseccomp libcap-ng pass desktop-file-utils gtk3 libx11 shadow
        pacman -U --noconfirm --needed {{ docker_desktop_tmpdir_arch.path | quote }}/docker-desktop-x86_64.pkg.tar.zst
        DOTFILES_ROOT_SCRIPT

        if [ -n {{ dotfiles_sudo_password_file | quote }} ]; then
          sudo -S -p '' /bin/bash "$root_script" < {{ dotfiles_sudo_password_file | quote }}
        else
          sudo -n /bin/bash "$root_script"
        fi
      args:
        executable: /bin/bash
  always:
    - name: Remove temporary Docker Desktop Arch package directory
      file:
        path: "{{ docker_desktop_tmpdir_arch.path }}"
        state: absent
      changed_when: false
      when: docker_desktop_tmpdir_arch is defined and docker_desktop_tmpdir_arch.path is defined
