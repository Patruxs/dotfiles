---
- name: Install or update VirtualBox on Debian-based Linux
  become: yes
  shell: |
    set -euo pipefail
    apt-get update
    apt-get install -y virtualbox virtualbox-dkms virtualbox-qt
  args:
    executable: /bin/bash
  changed_when: false
  when:
    - dotfiles_platform.distro_key == 'debian'

- name: Install or update VirtualBox on Fedora
  become: yes
  shell: |
    set -euo pipefail
    dnf install -y https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm
    dnf install -y VirtualBox akmod-VirtualBox
  args:
    executable: /bin/bash
  changed_when: false
  when:
    - dotfiles_platform.distro_key == 'fedora'

- name: Install or update VirtualBox on Arch Linux
  become: yes
  command:
    argv:
      - pacman
      - -S
      - --noconfirm
      - --needed
      - virtualbox
      - virtualbox-host-modules-arch
  changed_when: false
  when:
    - dotfiles_platform.distro_key == 'arch'
    - dotfiles_platform.architecture in ['x86_64', 'amd64']
