---
- name: Install or update VirtualBox on Debian-based Linux
  ansible.builtin.shell: |
    set -euo pipefail

    if [ -n {{ dotfiles_sudo_password_file | quote }} ]; then
      sudo -S -p '' apt-get update < {{ dotfiles_sudo_password_file | quote }}
      sudo -S -p '' apt-get install -y virtualbox virtualbox-dkms virtualbox-qt < {{ dotfiles_sudo_password_file | quote }}
    else
      sudo -n apt-get update
      sudo -n apt-get install -y virtualbox virtualbox-dkms virtualbox-qt
    fi
  args:
    executable: /bin/bash
  changed_when: false
  when:
    - dotfiles_platform.distro_key == 'debian'

- name: Install or update VirtualBox on Fedora
  ansible.builtin.shell: |
    set -euo pipefail

    if [ -n {{ dotfiles_sudo_password_file | quote }} ]; then
      sudo -S -p '' dnf install -y "https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm" < {{ dotfiles_sudo_password_file | quote }}
      sudo -S -p '' dnf install -y VirtualBox akmod-VirtualBox < {{ dotfiles_sudo_password_file | quote }}
    else
      sudo -n dnf install -y "https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm"
      sudo -n dnf install -y VirtualBox akmod-VirtualBox
    fi
  args:
    executable: /bin/bash
  changed_when: false
  when:
    - dotfiles_platform.distro_key == 'fedora'

- name: Install or update VirtualBox on Arch Linux
  ansible.builtin.shell: |
    set -euo pipefail

    if [ -n {{ dotfiles_sudo_password_file | quote }} ]; then
      sudo -S -p '' pacman -S --noconfirm --needed virtualbox virtualbox-host-modules-arch < {{ dotfiles_sudo_password_file | quote }}
    else
      sudo -n pacman -S --noconfirm --needed virtualbox virtualbox-host-modules-arch
    fi
  args:
    executable: /bin/bash
  changed_when: false
  when:
    - dotfiles_platform.distro_key == 'arch'
    - dotfiles_platform.architecture in ['x86_64', 'amd64']
