---
- name: Install AI CLI {{ ai_cli.key }} (strict)
  include_tasks: unix.yml
  when: dotfiles_setup_mode | default('best_effort') == 'strict'

- name: Install AI CLI {{ ai_cli.key }} (best effort)
  block:
    - include_tasks: unix.yml
  rescue:
    - name: Record AI CLI installer failure
      set_fact:
        dotfiles_setup_failures: >-
          {{
            (dotfiles_setup_failures | default([])) + [
              {
                'phase': 'ai_cli',
                'name': ai_cli.key,
                'task': ansible_failed_task.name | default('unknown task'),
                'error': ansible_failed_result.msg | default(ansible_failed_result.stderr | default(ansible_failed_result | to_json))
              }
            ]
          }}
  when: dotfiles_setup_mode | default('best_effort') == 'best_effort'
