---
- name: Configure Linux shell defaults
  include_tasks: linux.yml
  when:
    - dotfiles_platform.system == 'Linux'
    - not (dotfiles_ci | default(false))

- name: Configure macOS shell defaults
  include_tasks: macos.yml
  when:
    - dotfiles_platform.os_family == 'Darwin'
    - not (dotfiles_ci | default(false))
