---
- name: Install system packages (Fedora strict)
  ansible.builtin.shell: |
    set -euo pipefail

    if [ -n {{ dotfiles_sudo_password_file | quote }} ]; then
      sudo -S -p '' dnf install -y {{ system_packages | map('quote') | join(' ') }} < {{ dotfiles_sudo_password_file | quote }}
    else
      sudo -n dnf install -y {{ system_packages | map('quote') | join(' ') }}
    fi
  args:
    executable: /bin/bash
  when:
    - dotfiles_setup_mode | default('best_effort') == 'strict'
    - not (dotfiles_low_memory_setup | default(false) | bool)

- name: Install system packages one at a time (Fedora low memory strict)
  ansible.builtin.shell: |
    set -euo pipefail

    if [ -n {{ dotfiles_sudo_password_file | quote }} ]; then
      sudo -S -p '' dnf --setopt=max_parallel_downloads=1 install -y {{ item | quote }} < {{ dotfiles_sudo_password_file | quote }}
    else
      sudo -n dnf --setopt=max_parallel_downloads=1 install -y {{ item | quote }}
    fi
  args:
    executable: /bin/bash
  loop: "{{ system_packages }}"
  loop_control:
    label: "{{ item }}"
  when:
    - dotfiles_setup_mode | default('best_effort') == 'strict'
    - dotfiles_low_memory_setup | default(false) | bool

- name: Install system packages one at a time (Fedora best effort)
  ansible.builtin.shell: |
    set -euo pipefail

    if [ -n {{ dotfiles_sudo_password_file | quote }} ]; then
      sudo -S -p '' dnf --setopt=max_parallel_downloads=1 install -y {{ item | quote }} < {{ dotfiles_sudo_password_file | quote }}
    else
      sudo -n dnf --setopt=max_parallel_downloads=1 install -y {{ item | quote }}
    fi
  args:
    executable: /bin/bash
  loop: "{{ system_packages }}"
  loop_control:
    label: "{{ item }}"
  register: dotfiles_dnf_package_install_results
  changed_when: dotfiles_dnf_package_install_results.rc == 0
  failed_when: false
  when: dotfiles_setup_mode | default('best_effort') == 'best_effort'

- name: Record Fedora package installation failures
  set_fact:
    dotfiles_setup_failures: >-
      {{
        (dotfiles_setup_failures | default([])) + [
          {
            'phase': 'dnf_package',
            'name': item.item,
            'task': 'Install system packages one at a time (Fedora best effort)',
            'error': (item.stderr | default('') | string) if (item.stderr | default('') | string | length > 0) else (item.msg | default(item.stdout | default(item | to_json)))
          }
        ]
      }}
  loop: "{{ dotfiles_dnf_package_install_results.results | default([]) }}"
  loop_control:
    label: "{{ item.item | default('unknown package') }}"
  when:
    - dotfiles_setup_mode | default('best_effort') == 'best_effort'
    - item.rc is defined
    - item.rc != 0
