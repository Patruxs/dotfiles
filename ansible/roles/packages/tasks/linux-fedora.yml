---
- name: Install system packages (Fedora)
  ansible.builtin.shell: |
    set -euo pipefail

    if [ -n {{ dotfiles_sudo_password_file | quote }} ]; then
      sudo -S -p '' dnf install -y {{ system_packages | map('quote') | join(' ') }} < {{ dotfiles_sudo_password_file | quote }}
    else
      sudo -n dnf install -y {{ system_packages | map('quote') | join(' ') }}
    fi
  args:
    executable: /bin/bash
  when: not (dotfiles_low_memory_setup | default(false) | bool)

- name: Install system packages one at a time (Fedora low memory)
  ansible.builtin.shell: |
    set -euo pipefail

    if [ -n {{ dotfiles_sudo_password_file | quote }} ]; then
      sudo -S -p '' dnf --setopt=max_parallel_downloads=1 install -y {{ item | quote }} < {{ dotfiles_sudo_password_file | quote }}
    else
      sudo -n dnf --setopt=max_parallel_downloads=1 install -y {{ item | quote }}
    fi
  args:
    executable: /bin/bash
  loop: "{{ system_packages }}"
  loop_control:
    label: "{{ item }}"
  when: dotfiles_low_memory_setup | default(false) | bool
