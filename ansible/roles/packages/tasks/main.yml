---
- name: Merge package lists
  vars:
    ci_excluded_system_packages:
      - flatpak
      - docker
      - docker.io
      - moby-engine
    docker_desktop_conflicting_system_packages: >-
      {{
        ['docker.io']
        if dotfiles_platform.distro_key == 'debian'
        else []
      }}
    merged_system_packages: >-
      {{
        (chezmoi_data.packages.common.system[dotfiles_platform.distro_key] | default([])) +
        (chezmoi_data.packages[profile].system[dotfiles_platform.distro_key] | default([]))
      }}
    system_package_exclusions: >-
      {{
        (ci_excluded_system_packages if dotfiles_ci | default(false) else []) +
        (
          docker_desktop_conflicting_system_packages
          if 'docker-desktop' in (linux_native_apps | default([]))
          else []
        )
      }}
  set_fact:
    system_packages: >-
      {{
        merged_system_packages
        | reject('in', system_package_exclusions)
        | list
      }}
    homebrew_brews: "{{ (chezmoi_data.packages.common.homebrew.brews | default([])) + (chezmoi_data.packages[profile].homebrew.brews | default([])) }}"
    homebrew_casks: >-
      {{
        []
        if dotfiles_ci | default(false)
        else
        (
          (chezmoi_data.packages.common.homebrew.casks | default([])) +
          (chezmoi_data.packages[profile].homebrew.casks | default([]))
        )
      }}

- name: Install Linux system packages
  include_tasks: "linux-{{ dotfiles_platform.distro_key }}.yml"
  when:
    - dotfiles_platform.system == 'Linux'
    - dotfiles_platform.distro_key != ''
    - system_packages | length > 0

- name: Install Homebrew packages
  include_tasks: macos.yml
  when:
    - dotfiles_platform.os_family == 'Darwin'

- name: Install JetBrains Toolbox helper
  include_tasks: linux-jetbrains-toolbox.yml
  when:
    - dotfiles_platform.system == 'Linux'
    - install_jetbrains_toolbox | default(false)
    - not (dotfiles_ci | default(false))
