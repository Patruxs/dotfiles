name: CI

on:
#  push:
#    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  ubuntu-latest:
    name: Ubuntu (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [personal, work]
    env:
      GITHUB_TOKEN: ${{ github.token }}
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Run Bootstrap
      run: ./bootstrap.sh --profile ${{ matrix.profile }}
        
    - name: Check Idempotency
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        output_log="$(mktemp)"
        chezmoi_diff="$(mktemp)"
        ./bootstrap.sh --profile ${{ matrix.profile }} | tee "$output_log"
        if grep -qE "changed=[1-9]" "$output_log"; then
          echo "Idempotency test failed, changes were made on the second run"
          exit 1
        fi
        chezmoi diff --source "$PWD" > "$chezmoi_diff"
        if [ -s "$chezmoi_diff" ]; then
          cat "$chezmoi_diff"
          echo "Idempotency test failed, chezmoi diff reported changes after the second run"
          exit 1
        fi

  macos-latest:
    name: macOS (${{ matrix.profile }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [personal, work]
    env:
      GITHUB_TOKEN: ${{ github.token }}
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_ENV_HINTS: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
    steps:
    - uses: actions/checkout@v5
    - name: Run Bootstrap
      run: ./bootstrap.sh --profile ${{ matrix.profile }}
    - name: Check Idempotency
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        output_log="$(mktemp)"
        chezmoi_diff="$(mktemp)"
        ./bootstrap.sh --profile ${{ matrix.profile }} | tee "$output_log"
        if grep -qE "changed=[1-9]" "$output_log"; then
          echo "Idempotency test failed, changes were made on the second run"
          exit 1
        fi
        chezmoi diff --source "$PWD" > "$chezmoi_diff"
        if [ -s "$chezmoi_diff" ]; then
          cat "$chezmoi_diff"
          echo "Idempotency test failed, chezmoi diff reported changes after the second run"
          exit 1
        fi

  windows-latest:
    name: Windows (${{ matrix.profile }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [personal, work]
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
    - uses: actions/checkout@v5
      with:
        set-safe-directory: false
    - name: Run Bootstrap
      run: .\bootstrap.ps1 -ProfileName ${{ matrix.profile }}
    - name: Check Idempotency
      shell: pwsh
      run: |
        .\bootstrap.ps1 -ProfileName ${{ matrix.profile }}
        $diff = chezmoi diff --source "$PWD"
        if ($LASTEXITCODE -ne 0) {
          throw "chezmoi diff failed with exit code $LASTEXITCODE."
        }
        if (-not [string]::IsNullOrWhiteSpace($diff)) {
          $diff | Write-Host
          throw "Idempotency test failed, chezmoi diff reported changes after the second run."
        }
    - name: Run CI Bootstrap Regression Checks
      shell: bash
      run: ./test/ci_bootstrap_regressions.sh

  fedora-latest:
    name: Fedora (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [personal, work]
    container:
      image: fedora:latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
    - name: Install dependencies
      run: dnf install -y git sudo curl
    - uses: actions/checkout@v5
    - name: Run Bootstrap (Fedora)
      run: ./bootstrap.sh --profile ${{ matrix.profile }}
    - name: Check Idempotency (Fedora)
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        output_log="$(mktemp)"
        chezmoi_diff="$(mktemp)"
        ./bootstrap.sh --profile ${{ matrix.profile }} | tee "$output_log"
        if grep -qE "changed=[1-9]" "$output_log"; then
          echo "Idempotency test failed, changes were made on the second run"
          exit 1
        fi
        chezmoi diff --source "$PWD" > "$chezmoi_diff"
        if [ -s "$chezmoi_diff" ]; then
          cat "$chezmoi_diff"
          echo "Idempotency test failed, chezmoi diff reported changes after the second run"
          exit 1
        fi

  arch-latest:
    name: Arch (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [personal, work]
    container:
      image: archlinux:latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
    - name: Install dependencies
      run: pacman -Syu --noconfirm git sudo curl
    - uses: actions/checkout@v5
    - name: Run Bootstrap (Arch)
      run: ./bootstrap.sh --profile ${{ matrix.profile }}
    - name: Check Idempotency (Arch)
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        output_log="$(mktemp)"
        chezmoi_diff="$(mktemp)"
        ./bootstrap.sh --profile ${{ matrix.profile }} | tee "$output_log"
        if grep -qE "changed=[1-9]" "$output_log"; then
          echo "Idempotency test failed, changes were made on the second run"
          exit 1
        fi
        chezmoi diff --source "$PWD" > "$chezmoi_diff"
        if [ -s "$chezmoi_diff" ]; then
          cat "$chezmoi_diff"
          echo "Idempotency test failed, chezmoi diff reported changes after the second run"
          exit 1
        fi
