name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  ubuntu-latest:
    runs-on: ubuntu-latest
    env:
      DOTFILES_CI: "1"
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Run Bootstrap
      run: ./bootstrap.sh --profile personal
        
    - name: Check Idempotency
      run: |
        ./bootstrap.sh --profile personal | tee output.log
        if grep -qE "changed=[1-9]" output.log; then
          echo "Idempotency test failed, changes were made on the second run"
          exit 1
        fi

  macos-latest:
    runs-on: macos-latest
    env:
      DOTFILES_CI: "1"
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_ENV_HINTS: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
    steps:
    - uses: actions/checkout@v5
    - name: Run Bootstrap
      run: ./bootstrap.sh --profile personal
    - name: Check Idempotency
      run: |
        ./bootstrap.sh --profile personal | tee output.log
        if grep -qE "changed=[1-9]" output.log; then
          echo "Idempotency test failed, changes were made on the second run"
          exit 1
        fi

  windows-latest:
    runs-on: windows-latest
    env:
      DOTFILES_CI: "1"
    steps:
    - uses: actions/checkout@v5
    - name: Run Bootstrap
      run: .\bootstrap.ps1 -ProfileName personal
    - name: Check Idempotency
      run: .\bootstrap.ps1 -ProfileName personal

  fedora-latest:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    env:
      DOTFILES_CI: "1"
    steps:
    - name: Install dependencies
      run: dnf install -y git sudo curl
    - uses: actions/checkout@v5
    - name: Run Bootstrap (Fedora)
      run: ./bootstrap.sh --profile personal
    - name: Check Idempotency (Fedora)
      run: |
        ./bootstrap.sh --profile personal | tee output.log
        if grep -qE "changed=[1-9]" output.log; then
          echo "Idempotency test failed, changes were made on the second run"
          exit 1
        fi

  arch-latest:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    env:
      DOTFILES_CI: "1"
    steps:
    - name: Install dependencies
      run: pacman -Syu --noconfirm git sudo curl
    - uses: actions/checkout@v5
    - name: Run Bootstrap (Arch)
      run: ./bootstrap.sh --profile personal
    - name: Check Idempotency (Arch)
      run: |
        ./bootstrap.sh --profile personal | tee output.log
        if grep -qE "changed=[1-9]" output.log; then
          echo "Idempotency test failed, changes were made on the second run"
          exit 1
        fi
