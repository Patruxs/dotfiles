ai_clis:
  clis:
    codex:
      command: codex
      install:
        unix: curl -fsSL https://chatgpt.com/codex/install.sh | sh
        windows: irm https://chatgpt.com/codex/install.ps1 | iex
      login: Run `codex` and sign in with ChatGPT or an API key.
    agy:
      command: agy
      install:
        unix: curl -fsSL https://antigravity.google/cli/install.sh | bash
        windows: irm https://antigravity.google/cli/install.ps1 | iex
      login: Run `agy` and follow the browser or terminal auth flow.
    claude:
      command: claude
      install:
        unix: curl -fsSL https://claude.ai/install.sh | bash
        windows: irm https://claude.ai/install.ps1 | iex
      login: Run `claude` and follow the sign-in flow.
    droid:
      command: droid
      install:
        unix: curl -fsSL https://app.factory.ai/cli | sh
        windows: irm https://app.factory.ai/cli/windows | iex
      login: Run `droid` and complete the browser login if prompted.
    opencode:
      command: opencode
      install:
        unix: curl -fsSL https://opencode.ai/install | bash
        windows: npm install -g opencode-ai
      login: Run `opencode`, then use `/connect`.
