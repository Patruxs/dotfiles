##### Minimal tmux config: conservative defaults + ergonomic extras #####

# Keep the default prefix: Ctrl-b.
# This avoids fighting tmux muscle memory and keeps tutorials/docs usable.

# Terminal / color correctness for Ghostty, Neovim, and modern TUIs.
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB,xterm-256color:RGB,screen-256color:RGB"
set -g focus-events on
set -g escape-time 10

# Practical defaults.
set -g mouse on
set -g history-limit 100000
set -g renumber-windows on
setw -g mode-keys vi

# Minimal statusline: readable, not flashy.
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=default,fg=colour245"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=colour39]#S #[fg=colour240]| "
set -g status-right "#[fg=colour240]%Y-%m-%d #[fg=colour245]%H:%M"
set -g window-status-format " #[fg=colour245]#I:#W "
set -g window-status-current-format " #[fg=colour39]#I:#W* "
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"
set -g message-style "bg=default,fg=colour39"

# Reload config. Adds one ergonomic binding; does not remove any default binding.
bind-key r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Ergonomic pane movement with Vim-style keys after prefix.
# Defaults like Prefix + arrows still work.
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Ergonomic pane resizing after prefix. Defaults like Prefix + Ctrl/Alt arrows still work.
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 3
bind-key -r K resize-pane -U 3
bind-key -r L resize-pane -R 5

# More comfortable splits while keeping tmux defaults: Prefix + " and Prefix + % still work.
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# New windows/panes open in the current working directory.
bind-key c new-window -c "#{pane_current_path}"

# Vi-style copy mode quality-of-life.
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# Wayland clipboard integration when wl-copy exists. Safe no-op otherwise.
if-shell 'command -v wl-copy >/dev/null 2>&1' 'bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"'
